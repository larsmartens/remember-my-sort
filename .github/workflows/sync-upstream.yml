name: Sync Upstream

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/hxreborn/remember-my-sort.git || true

      - name: Fetch upstream
        run: git fetch upstream main --tags

      - name: Check for upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commit(s) ahead"

      - name: Capture fork baseline
        id: base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Merge upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/main --no-edit -X ours || {
            git diff --name-only --diff-filter=U > conflicts.txt
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              case "$path" in
                .github/workflows/*)
                  git restore --source="${{ steps.base.outputs.sha }}" --staged --worktree -- "$path" 2>/dev/null || git rm -f -- "$path"
                  ;;
                gradle.properties)
                  git checkout --theirs -- "$path" 2>/dev/null || git rm -f -- "$path"
                  ;;
                *)
                  git checkout --ours -- "$path" 2>/dev/null || git rm -f -- "$path"
                  ;;
              esac
            done < conflicts.txt
            rm -f conflicts.txt
            git add -A
            git commit --no-edit
          }

      - name: Bump fork version
        if: steps.check.outputs.behind != '0'
        id: version
        run: |
          RAW_VERSION=$(grep '^version\.name=' gradle.properties | head -n 1 | cut -d= -f2- | tr -d '\r')
          BASE_VERSION=${RAW_VERSION%%-fork.*}
          BUILD_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((300000 + BUILD_COUNT))
          VERSION_NAME="${BASE_VERSION}-fork.${BUILD_COUNT}"
          TAG_NAME="v${VERSION_NAME}"
          TMP_PROPS=$(mktemp)
          grep -v '^version\.\(code\|name\)=' gradle.properties > "${TMP_PROPS}"
          printf '\nversion.code=%s\nversion.name=%s\n' "${VERSION_CODE}" "${VERSION_NAME}" >> "${TMP_PROPS}"
          mv "${TMP_PROPS}" gradle.properties
          printf 'version_code=%s\n' "${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          printf 'version_name=%s\n' "${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          printf 'tag_name=%s\n' "${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        if: steps.check.outputs.behind != '0'
        run: |
          git add gradle.properties
          if ! git diff --cached --quiet; then
            git commit -m "chore: prepare fork release metadata"
          fi

      - name: Restore fork workflows
        if: steps.check.outputs.behind != '0'
        run: |
          git restore --source="${{ steps.base.outputs.sha }}" --staged --worktree .github/workflows || true
          if ! git diff --quiet -- .github/workflows; then
            git add .github/workflows
            git commit -m "chore: preserve fork workflows after upstream sync"
          fi

      - name: Push synced branch
        if: steps.check.outputs.behind != '0'
        run: git push origin main

      - name: Create and push release tag
        if: steps.check.outputs.behind != '0'
        run: |
          git tag -a "${{ steps.version.outputs.tag_name }}" -m "${{ steps.version.outputs.tag_name }}"
          git push origin "${{ steps.version.outputs.tag_name }}"
